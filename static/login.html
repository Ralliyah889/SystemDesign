<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TagSense AI — Sign In</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            padding: 1rem;
            position: relative;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .login-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .login-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            margin-bottom: 0.5rem;
        }
        .login-header h2 {
            font-size: 1.5rem;
            color: var(--text-title);
            font-weight: 700;
        }
        .login-header p {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .input-group label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            padding: 0.65rem 0.8rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
        }
        .login-error {
            background: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            font-size: 0.78rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            text-align: center;
        }
    </style>
    <!-- Theme Gating -->
    <script>
        if (localStorage.getItem("tagsense_theme") === "light") {
            document.documentElement.classList.add("light-theme");
        }
    </script>
</head>
<body>

    <div class="login-wrapper">
        <div style="position: absolute; top: 1.5rem; right: 1.5rem;">
            <button class="icon-button" id="theme-toggle" title="Toggle Light/Dark Theme" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); padding: 0.5rem; border-radius: 50%;">
                🌓
            </button>
        </div>
        <div class="glass-panel login-card">
            <div class="login-header">
                <div class="login-logo">TS</div>
                <h2>TagSense <span style="color: var(--accent-indigo);">AI</span></h2>
                <p>Enterprise SaaS Platform Portal</p>
            </div>
            
            <div id="error-box" class="login-error hidden">
                Invalid console credentials. Please try again.
            </div>

            <form id="login-form" class="form-container" style="gap: 1.25rem;">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. admin" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary" style="padding: 0.65rem 1rem; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; margin-top: 0.5rem;">
                    Sign In to Portal
                </button>
            </form>
            
            <div style="text-align: center; font-size: 0.72rem; color: var(--text-muted);">
                Default credentials: <code style="color: var(--text-secondary);">admin</code> / <code style="color: var(--text-secondary);">tagsense-admin</code>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Check if already logged in
            if (sessionStorage.getItem("tagsense_token") === "authenticated") {
                window.location.href = "/";
                return;
            }

            const form = document.getElementById("login-form");
            const errorBox = document.getElementById("error-box");

            // Theme toggle listener for login page
            const themeToggleBtn = document.getElementById("theme-toggle");
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener("click", () => {
                    const isLight = document.documentElement.classList.toggle("light-theme");
                    localStorage.setItem("tagsense_theme", isLight ? "light" : "dark");
                });
            }

            form.addEventListener("submit", (e) => {
                e.preventDefault();
                const user = document.getElementById("username").value;
                const pass = document.getElementById("password").value;

                if (user === "admin" && pass === "tagsense-admin") {
                    sessionStorage.setItem("tagsense_token", "authenticated");
                    window.location.href = "/";
                } else {
                    errorBox.classList.remove("hidden");
                }
            });
        });
    </script>
</body>
</html>
